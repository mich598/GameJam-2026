<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lemonade Stand – Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scene_3.css">
</head>
<body>

  <!-- Pause button -->
  <button id="pause-btn" onclick="pauseGame()">⏸</button>

  <!-- Pause overlay -->
  <div id="pause-overlay" hidden>
    <div id="pause-card">
      <h2 class="pause-title">⏸ Paused</h2>
      <button class="pause-action-btn green" onclick="resumeGame()">▶ Resume</button>
      <button class="pause-action-btn yellow" onclick="window.location.href='menu.html'">🏠 Main Menu</button>
    </div>
  </div>

  <!-- Earnings progress bar -->
  <div id="earnings-panel">
    <span class="earnings-title">🍋 Earnings</span>
    <div id="earnings-track"><div id="earnings-fill"></div></div>
    <span id="earnings-label">$0.00 / $13.00</span>
  </div>

  <!-- Happiness timer — outside the canvas so it's always visible -->
  <div id="sat-panel">
    <div id="sat-face">😄</div>
    <div id="sat-bar-track">
      <div id="sat-bar-fill"></div>
      <div id="sat-bar-glow"></div>
    </div>
    <div id="sat-label">MOOD</div>
    <div id="sat-time">3:00</div>
  </div>

  <div id="scene3">

    <!-- Layer 1: background -->
    <img id="bg" src="assets/background_image_scene_1.png" alt="">

    <!-- Layer 2: paying customer (behind bench) -->
    <img id="customer-pay" src="assets/customer_pay_boy.png" alt="">

    <!-- Layer 3: bench overlay -->
    <img id="bench" src="assets/Background_overlay.png" alt="">

    <!-- Layer 4: lemonade sitting on the counter -->
    <img id="lemonade-img" src="assets/lemonade.png" alt="Lemonade">

    <!-- Layer 4: speech bubble -->
    <div id="speech-bubble">
      <p>Here's <span id="customerPayment">$2.50</span>!</p>
    </div>

    <!-- Layer 4: cashier panel -->
    <div id="cashier-panel" class="cashier-ui">

      <!-- Price / change summary bar -->
      <div id="info-bar">
        <div class="info-item">
          <span class="info-label">PRICE</span>
          <span class="info-value">$5.00</span>
        </div>
        <div class="info-item">
          <span class="info-label">PAID</span>
          <span class="info-value" id="paid-display">$2.50</span>
        </div>
        <div class="info-item">
          <span class="info-label">CHANGE DUE</span>
          <span class="info-value highlight" id="requiredChange">$1.80</span>
        </div>
        <div class="info-item">
          <span class="info-label">IN TRAY</span>
          <span class="info-value" id="changeGivenDisplay">$0.00</span>
        </div>
        <button class="submit-btn" onclick="submitChange()">SUBMIT ✓</button>
      </div>

      <!-- Register image with overlaid change tray and coin buttons -->
      <div id="register-wrap">
        <img id="register-img" src="assets/register.png" alt="Cash Register">

        <!-- Change box overlaid on the left tray of the register -->
        <div id="changeBox"></div>

        <!-- Coin buttons overlaid on the register's coin slots (right side) -->
        <button class="coin-btn gold large"    data-val="200" onclick="addCoin(200)">$2</button>
        <button class="coin-btn gold large"    data-val="100" onclick="addCoin(100)">$1</button>
        <button class="coin-btn silver medium" data-val="50"  onclick="addCoin(50)">50¢</button>
        <button class="coin-btn silver medium" data-val="20"  onclick="addCoin(20)">20¢</button>
        <button class="coin-btn silver small-c" data-val="10" onclick="addCoin(10)">10¢</button>
        <button class="coin-btn silver small-c" data-val="5"  onclick="addCoin(5)">5¢</button>
      </div>

      <div id="bottom-row">
        <button class="nav-btn" onclick="clearLastCoin()">◄ Undo</button>
        <button class="hint-btn" onclick="toggleHint()" id="hintBtn">💡 Hint</button>
        <button class="nav-btn" onclick="clearAllCoins()">Clear ►</button>
      </div>

      <div class="hint-box" id="hintBox" style="display:none;"></div>
      <div class="status-message" id="statusMessage"></div>

    </div><!-- cashier-panel -->

  </div><!-- scene3 -->

  <script src="layout_3.js"></script>
  <script src="timer.js"></script>
  <script src="earnings.js"></script>
  <script src="scene_3.js"></script>
</body>
</html>
