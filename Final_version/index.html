<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lemonade Stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <!-- Minigame alert triangle -->
  <div id="minigame-alert" hidden onclick="clickMinigameAlert()">
    <img id="minigame-alert-img" src="" alt="minigame">
  </div>

  <!-- Pause button -->
  <button id="pause-btn" onclick="pauseGame()">⏸</button>

  <!-- Pause overlay -->
  <div id="pause-overlay" hidden>
    <div id="pause-card">
      <h2 class="pause-title">⏸ Paused</h2>
      <button class="pause-action-btn green" onclick="resumeGame()">▶ Resume</button>
      <button class="pause-action-btn yellow" onclick="window.location.href='menu.html'">🏠 Main Menu</button>
    </div>
  </div>

  <!-- Earnings progress bar -->
  <div id="earnings-panel">
    <span class="earnings-title">🍋 Earnings</span>
    <div id="earnings-track"><div id="earnings-fill"></div></div>
    <span id="earnings-label">$0.00 / $13.00</span>
  </div>

  <!-- Happiness timer — outside the canvas so it's always visible -->
  <div id="sat-panel">
    <div id="sat-face">😄</div>
    <div id="sat-bar-track">
      <div id="sat-bar-fill"></div>
      <div id="sat-bar-glow"></div>
    </div>
    <div id="sat-label">MOOD</div>
    <div id="sat-time">3:00</div>
  </div>

  <!-- Scene 1 -->
  <div id="scene1">

    <!-- Layer 1: Sky/background -->
    <img id="bg" src="assets/background_image_scene_1.png" alt="">

    <!-- Layer 2: Customer (behind bench) -->
    <img id="customer" src="assets/customer_boy.png" alt="Customer" hidden>

    <!-- Layer 3: Bench overlay (in front of customer) -->
    <img id="bench" src="assets/Background_overlay.png" alt="">

    <!-- Layer 4: UI elements (in front of everything) -->
    <div id="bubble" hidden>
      <p id="order-text"></p>
    </div>

    <div id="ticket-wrap" hidden>
      <img src="assets/Ticket_blank.png" alt="Ticket">
      <div class="zone" data-ing="ice"><span class="answer"></span></div>
      <div class="zone" data-ing="lemon"><span class="answer"></span></div>
      <div class="zone" data-ing="sugar"><span class="answer"></span></div>
      <div class="zone" data-ing="water"><span class="answer"></span></div>
    </div>

    <div id="fractions" hidden>
      <div id="denom-row"></div>
      <div id="frac-buttons"></div>
    </div>

    <button id="confirm-btn" hidden>Confirm Ticket</button>
    <div id="feedback"></div>

  </div>

  <!-- Scene 2 -->
  <div id="scene2" hidden>
    <h1>Now make the lemonade!</h1>
  </div>

  <script src="layout.js"></script>
  <script src="orders.js"></script>
  <script src="timer.js"></script>
  <script src="earnings.js"></script>
  <script src="main.js"></script>
</body>
</html>
