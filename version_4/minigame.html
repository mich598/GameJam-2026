<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍋 Timmy's Lemon Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="minigame_1.css"/>
</head>
<body>

  <div id="bg"></div>
  <div id="bg-overlay"></div>

  <!-- Floating lemons deco -->
  <div id="deco-container"></div>

  <!-- PIGGY BANK (top left) -->
  <div id="piggy-panel">
    <div id="piggy-icon">🐷</div>
    <div id="piggy-info">
      <div id="piggy-label">Piggy Bank</div>
      <div id="piggy-amount"><span>$</span><span id="piggy-value">0</span></div>
    </div>
  </div>

  <!-- LIVES (top right) -->
  <div id="lives-panel">
    <div id="lives-label">Lives</div>
    <div id="lives-hearts">
      <span class="heart" id="heart-1">❤️</span>
      <span class="heart" id="heart-2">❤️</span>
      <span class="heart" id="heart-3">❤️</span>
    </div>
  </div>

  <!-- MAIN -->
  <main id="main">
    <div id="story-banner">
      <span id="story-text">Oh no, Timmy forgot where he put his ingredients! Can you help him find them?</span>
    </div>

    <div id="board-wrap">
      <div id="board"></div>
    </div>
  </main>

  <!-- WIN OVERLAY -->
  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div id="overlay-emoji"></div>
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>
      <button id="overlay-btn" onclick="returnToGame()">Back to Game</button>
    </div>
  </div>

  <script src="minigame_1.js"></script>
</body>
</html>
