<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍋 Lemonade Stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="scene_2.css"/>
</head>
<body>

  <!-- Pause button -->
  <button id="pause-btn" onclick="pauseGame()">⏸</button>

  <!-- Pause overlay -->
  <div id="pause-overlay" hidden>
    <div id="pause-card">
      <h2 class="pause-title">⏸ Paused</h2>
      <button class="pause-action-btn green" onclick="resumeGame()">▶ Resume</button>
      <button class="pause-action-btn yellow" onclick="window.location.href='menu.html'">🏠 Main Menu</button>
    </div>
  </div>

  <!-- Earnings progress bar -->
  <div id="earnings-panel">
    <span class="earnings-title">🍋 Earnings</span>
    <div id="earnings-track"><div id="earnings-fill"></div></div>
    <span id="earnings-label">$0.00 / $50.00</span>
  </div>

  <!-- Background -->
  <div id="bg"></div>
  <div id="bg-overlay"></div>

  <!-- Floating lemons decoration -->
  <div class="float-deco" id="deco-container"></div>

  <!-- ═══════════════ SATISFACTION BAR (top-right) ═══════════════ -->
  <div id="sat-panel">
    <div id="sat-face">😄</div>
    <div id="sat-bar-track">
      <div id="sat-bar-fill"></div>
      <div id="sat-bar-glow"></div>
    </div>
    <div id="sat-label">MOOD</div>
    <div id="sat-time">30s</div>
  </div>

  <!-- ═══════════════ MAIN GAME ═══════════════ -->
  <main id="game">

    <!-- ORDER TICKET -->
    <section id="ticket" aria-label="Customer order ticket">
      <div class="ticket-pin"></div>
      <h2 class="ticket-title">ORDER #<span id="order-num">1</span></h2>
      <div class="ticket-divider"></div>
      <div class="ticket-rows">
        <div class="ticket-row" data-ing="water">
          <span class="ticket-ing-icon">💧</span>
          <span class="ticket-ing-name">Water</span>
          <span class="ticket-bubbles" id="tb-water"></span>
        </div>
        <div class="ticket-row" data-ing="ice">
          <span class="ticket-ing-icon">🧊</span>
          <span class="ticket-ing-name">Ice</span>
          <span class="ticket-bubbles" id="tb-ice"></span>
        </div>
        <div class="ticket-row" data-ing="sugar">
          <span class="ticket-ing-icon">🍬</span>
          <span class="ticket-ing-name">Sugar</span>
          <span class="ticket-bubbles" id="tb-sugar"></span>
        </div>
        <div class="ticket-row" data-ing="lemon">
          <span class="ticket-ing-icon">🍋</span>
          <span class="ticket-ing-name">Lemon</span>
          <span class="ticket-bubbles" id="tb-lemon"></span>
        </div>
      </div>
      <div class="ticket-divider dashed"></div>
    </section>

    <!-- CUP -->
    <section id="cup-section" aria-label="Lemonade cup">
      <div id="feedback" aria-live="polite"></div>

      <div id="cup-wrap">
        <svg id="cup-svg" viewBox="0 0 160 230" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <!-- Clip to inner cup trapezoid -->
            <clipPath id="inner-clip">
              <polygon points="28,16 132,16 118,214 42,214"/>
            </clipPath>
            <!-- Glass shine gradient -->
            <linearGradient id="shine-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
              <stop offset="30%"  stop-color="white" stop-opacity="0.04"/>
              <stop offset="85%"  stop-color="white" stop-opacity="0.0"/>
              <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
            </linearGradient>
            <!-- Straw stripe -->
            <linearGradient id="straw-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#ff5252"/>
              <stop offset="33%"  stop-color="#ff5252"/>
              <stop offset="33%"  stop-color="white"/>
              <stop offset="66%"  stop-color="white"/>
              <stop offset="66%"  stop-color="#ff5252"/>
              <stop offset="100%" stop-color="#ff5252"/>
            </linearGradient>
            <filter id="bubble-blur">
              <feGaussianBlur stdDeviation="1.2"/>
            </filter>
          </defs>

          <!-- ── Fill layers (clipped) ── -->
          <g clip-path="url(#inner-clip)">
            <rect id="fill-water" x="0" y="214" width="160" height="0"
                  fill="#90caf9" opacity="0.88"/>
            <rect id="fill-ice"   x="0" y="214" width="160" height="0"
                  fill="#e0f7fa" opacity="0.80"/>
            <rect id="fill-sugar" x="0" y="214" width="160" height="0"
                  fill="#fffde7" opacity="0.82"/>
            <rect id="fill-lemon" x="0" y="214" width="160" height="0"
                  fill="#fff176" opacity="0.90"/>

            <!-- Animated bubbles group -->
            <g id="bubble-group" opacity="0.6"></g>

            <!-- Shine over fills -->
            <polygon points="28,16 132,16 118,214 42,214"
                     fill="url(#shine-grad)" opacity="0.5"/>
          </g>

          <!-- Cup body outline -->
          <polygon points="28,16 132,16 118,214 42,214"
                   fill="none"
                   stroke="rgba(255,255,255,0.75)"
                   stroke-width="3.5"
                   stroke-linejoin="round"/>

          <!-- Rim -->
          <rect x="22" y="8" width="116" height="14" rx="7"
                fill="rgba(255,255,255,0.5)"
                stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>

          <!-- Bottom base -->
          <rect x="42" y="211" width="76" height="6" rx="3"
                fill="rgba(255,255,255,0.35)"
                stroke="rgba(255,255,255,0.5)" stroke-width="1"/>

          <!-- Straw -->
          <rect id="straw" x="108" y="-30" width="10" height="120" rx="5"
                fill="url(#straw-grad)" opacity="0"/>

          <!-- Ice cubes (decorative) -->
          <g id="ice-cubes" opacity="0" clip-path="url(#inner-clip)">
            <rect x="50" y="165" width="22" height="22" rx="5"
                  fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"
                  transform="rotate(-8,61,176)"/>
            <rect x="85" y="155" width="20" height="20" rx="4"
                  fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"
                  transform="rotate(5,95,165)"/>
            <rect x="68" y="178" width="18" height="18" rx="4"
                  fill="rgba(255,255,255,0.45)" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"
                  transform="rotate(-3,77,187)"/>
          </g>

          <!-- Lemon slice (decorative) -->
          <g id="lemon-slice" opacity="0" clip-path="url(#inner-clip)">
            <circle cx="60" cy="185" r="14" fill="#fff176" stroke="#fdd835" stroke-width="1.5"/>
            <line x1="60" y1="171" x2="60" y2="199" stroke="#fbc02d" stroke-width="1"/>
            <line x1="46" y1="185" x2="74" y2="185" stroke="#fbc02d" stroke-width="1"/>
            <line x1="50" y1="175" x2="70" y2="195" stroke="#fbc02d" stroke-width="0.8"/>
            <line x1="70" y1="175" x2="50" y2="195" stroke="#fbc02d" stroke-width="0.8"/>
          </g>
        </svg>

        <!-- liquid surface shimmer -->
        <div id="liquid-surface"></div>
      </div>

      <div id="action-btns">
        <button id="serve-btn" class="serve-btn" onclick="sendOrder()">
          <span class="serve-icon">🥤</span> SERVE!
        </button>
        <button id="next-btn" class="next-btn" onclick="newOrder()" style="display:none">
          <span class="serve-icon">🍋</span> Next Order
        </button>
      </div>
    </section>

    <!-- INGREDIENT CONTROLS -->
    <section id="controls" aria-label="Ingredient controls">
      <h3 class="controls-title">Your Mix</h3>

      <div class="ctrl-card" data-ing="water">
        <div class="ctrl-icon-wrap" style="--ing-color:#daeeff">💧</div>
        <div class="ctrl-body">
          <span class="ctrl-label">Water</span>
          <div class="ctrl-stepper">
            <button class="step-btn minus" onclick="change('water',-1)" aria-label="Remove water">−</button>
            <div class="step-display">
              <span class="step-val" id="v-water">0</span>
              <div class="step-dots" id="d-water"></div>
            </div>
            <button class="step-btn plus" onclick="change('water',1)" aria-label="Add water">+</button>
          </div>
        </div>
      </div>

      <div class="ctrl-card" data-ing="ice">
        <div class="ctrl-icon-wrap" style="--ing-color:#e8f9ff">🧊</div>
        <div class="ctrl-body">
          <span class="ctrl-label">Ice</span>
          <div class="ctrl-stepper">
            <button class="step-btn minus" onclick="change('ice',-1)" aria-label="Remove ice">−</button>
            <div class="step-display">
              <span class="step-val" id="v-ice">0</span>
              <div class="step-dots" id="d-ice"></div>
            </div>
            <button class="step-btn plus" onclick="change('ice',1)" aria-label="Add ice">+</button>
          </div>
        </div>
      </div>

      <div class="ctrl-card" data-ing="sugar">
        <div class="ctrl-icon-wrap" style="--ing-color:#fff9c4">🍬</div>
        <div class="ctrl-body">
          <span class="ctrl-label">Sugar</span>
          <div class="ctrl-stepper">
            <button class="step-btn minus" onclick="change('sugar',-1)" aria-label="Remove sugar">−</button>
            <div class="step-display">
              <span class="step-val" id="v-sugar">0</span>
              <div class="step-dots" id="d-sugar"></div>
            </div>
            <button class="step-btn plus" onclick="change('sugar',1)" aria-label="Add sugar">+</button>
          </div>
        </div>
      </div>

      <div class="ctrl-card" data-ing="lemon">
        <div class="ctrl-icon-wrap" style="--ing-color:#fff176">🍋</div>
        <div class="ctrl-body">
          <span class="ctrl-label">Lemon</span>
          <div class="ctrl-stepper">
            <button class="step-btn minus" onclick="change('lemon',-1)" aria-label="Remove lemon">−</button>
            <div class="step-display">
              <span class="step-val" id="v-lemon">0</span>
              <div class="step-dots" id="d-lemon"></div>
            </div>
            <button class="step-btn plus" onclick="change('lemon',1)" aria-label="Add lemon">+</button>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="timer.js"></script>
  <script src="earnings.js"></script>
  <script src="game.js"></script>
</body>
</html>
