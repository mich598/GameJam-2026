<!DOCTYPE html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Escape Math Game</title>

    <link rel="stylesheet" href="minigame.css">
</head>
<body>

  <div class="game-container">

    <!-- Top progress bar -->
    <div id="topBar" class="top-bar">
      <div id="progressFill" class="progress-fill"></div>
      <div id="progressText" class="progress-text">0 / 3</div>
    </div>

    <!-- Game scene -->
    <div id="mathScene" class="scene">
      <h1 class="title">Police Inspection</h1>

      <p class="story">
        The police suspect your business is illegal. Solve the area problems before they investigate.
      </p>

      <div class="meta-row">
        <div id="timer" class="timer">Time: 30</div>
        <div id="progress" class="progress">Question 1 of 3</div>
      </div>

      <div id="questionCard" class="question-card">
        <h2 id="shapeTitle"></h2>
        <div id="formulaBox" class="formula-box"></div>
        <div id="valueBox" class="value-box"></div>
        <div id="shapeDiagram" class="shape-diagram"></div>
      </div>

      <div class="answer-section">
        <input id="answerInput" type="number" placeholder="Enter area" />
        <button id="submitAnswer" class="btn primary">Submit</button>
      </div>

      <div id="feedback" class="feedback"></div>
    </div>

    <!-- End scene -->
    <div id="endScene" class="scene hidden">
      <div class="end-card">
        <div id="finalResult" class="final-result"></div>
        <button id="restartBtn" class="btn restart">Restart Game</button>
      </div>
    </div>

  </div>

  <script src="minigame.js"></script>
</body>
</html>
